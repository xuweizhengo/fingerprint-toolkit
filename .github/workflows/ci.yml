name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1"  # Weekly Monday

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify package
        run: |
          pip install -e .
          python -c "from fingerprint_toolkit import FingerprintKit; fpk = FingerprintKit(); print('Profile:', fpk.get_profile_json()); print('Script length:', len(fpk.to_script()))"
      - name: Test CLI
        run: |
          fingerprint-toolkit generate --json